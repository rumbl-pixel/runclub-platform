<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gwynne Park Run Club - Admin Login</title>
    <link rel="stylesheet" href="styles.css?v=9" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0c5aa8" />
    <link rel="apple-touch-icon" href="assets/app-icon-192.png" />
    <script src="config.js"></script>
  </head>
  <body class="page page-admin-login">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <img class="brand-logo" src="assets/gwynne-park-logo.png" alt="Gwynne Park Schools" />
          <h1>Gwynne Park Run Club</h1>
        </div>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="student.html">Student login</a>
        </nav>
      </div>
    </header>

    <main class="content">
      <div style="max-width: 400px; margin: 0 auto;">
        <h2 style="margin-bottom: 1rem;">Admin Login</h2>
        <form id="admin-login-form" class="card">
          <label>
            Email
            <input type="text" id="admin-email" required placeholder="admin@yourschool.edu or DEMO" />
          </label>
          <label>
            Password
            <input type="password" id="admin-password" required placeholder="Password" />
          </label>
          <button type="submit">Sign in</button>
          <p id="admin-error" class="error-message"></p>
          <p style="margin-top: 1rem; font-size: 0.82rem; color: #888;">
            Type DEMO in either field to open the demo dashboard.
          </p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <p>Gwynne Park Run Club &copy; 2026 &middot; <a href="privacy-policy.html">Privacy Policy</a></p>
    </footer>

    <script src="admin.js"></script>
    <script src="pwa.js"></script>
  </body>
</html>
