<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gwynne Park Run Club - Scanner Kiosk</title>
  <link rel="stylesheet" href="styles.css?v=38" />
  <link rel="stylesheet" href="kiosk.css?v=8" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0c5aa8" />
  <link rel="apple-touch-icon" href="assets/app-icon-192.png" />
  <script src="config.js"></script>
</head>
<body class="page page-kiosk">
    <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="kiosk-header">
    <div class="kiosk-brand"><img class="kiosk-brand-logo" src="assets/gwynne-park-logo.png" alt="Gwynne Park Schools" />Gwynne Park Run Club</div>
    <div class="kiosk-status">
      <span id="kiosk-session">Session: Run Club</span>
      <span class="kiosk-dot">•</span>
      <span class="kiosk-connected">Scanner: keyboard mode</span>
    </div>
  </header>

  <main id="main-content" class="kiosk-main">
    <!-- Big, high-contrast feedback banner: the single focal point -->
    <section id="kiosk-banner" class="kiosk-banner kiosk-banner--ready">
      <h1 id="kiosk-banner-title">Ready to scan</h1>
      <p id="kiosk-banner-sub">Hold your barcode under the scanner</p>
    </section>

    <button id="camera-scan-btn" class="camera-scan-btn" type="button">Tap to start camera scan</button>
    <div id="camera-scan-panel" class="camera-scan-panel" hidden>
      <video id="camera-preview" playsinline muted></video>
      <p id="camera-scan-status">Point the camera at a student barcode.</p>
    </div>

    <!-- Hidden input that always holds focus for Bluetooth (HID) scanners -->
    <input type="text" id="kiosk-scan-input" class="kiosk-hidden-input"
           autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" aria-label="Barcode scan input" />

    <div class="kiosk-meta">
      <span id="kiosk-last-scan">Last: —</span>
      <span id="kiosk-lap-count">Laps this session: 0</span>
    </div>

    <button id="kiosk-undo" class="kiosk-undo" hidden>Undo last lap</button>
  </main>

  <footer class="kiosk-footer">
    <button id="kiosk-exit" class="kiosk-exit" type="button">Exit kiosk</button>
  </footer>

  <script src="backend.js?v=21"></script>
  <script src="scanning.js"></script>
  <script src="kiosk.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
